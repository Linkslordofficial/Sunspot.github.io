<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Neon Download Page</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
:root{
  --bg:#000;
  --card:#0b0b0b;
  --text:#fff;
  --neon:#00ff6a;
}
body{
  margin:0;
  font-family:Arial, sans-serif;
  background:var(--bg);
  color:var(--text);
}

/* HEADER */
.header{
  padding:15px;
  text-align:center;
  font-size:20px;
  font-weight:bold;
  border-bottom:1px solid var(--neon);
  position:relative;
}
.header input{
  position:absolute;
  left:15px;
  top:12px;
  width:140px;
  padding:6px;
  background:#000;
  border:1px solid var(--neon);
  color:var(--neon);
  border-radius:6px;
}

/* TOP AD */
.ad-top{
  margin:10px;
  padding:10px;
  border:1px solid var(--neon);
  border-radius:8px;
  text-align:center;
}

/* GRID */
.container{
  padding:15px;
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(170px,1fr));
  gap:15px;
}

/* POST */
.post{
  background:var(--card);
  border-radius:10px;
  overflow:hidden;
  text-align:center;
  box-shadow:0 0 12px rgba(0,255,106,.15);
}
.post img{
  width:210px;
  height:130px;
  object-fit:cover;
}
.post h3{
  margin:10px;
  font-size:15px;
}
.btn{
  margin:10px;
  padding:10px;
  background:var(--neon);
  color:#000;
  font-weight:bold;
  border-radius:6px;
  cursor:pointer;
}

/* GRID AD */
.grid-ad{
  grid-column:1/-1;
}
.grid-ad-box{
  background:#000;
  border:1px dashed var(--neon);
  border-radius:10px;
  padding:15px;
  text-align:center;
  box-shadow:0 0 15px rgba(0,255,106,.3);
}

/* POPUP */
.popup{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.9);
  display:none;
  justify-content:center;
  align-items:center;
  z-index:999;
}
.popup-box{
  background:var(--card);
  width:90%;
  max-width:380px;
  padding:15px;
  border-radius:10px;
  position:relative;
  text-align:center;
}
.popup-box img{
  width:100%;
  border-radius:8px;
}
.link-btn{
  display:block;
  margin:8px 0;
  padding:10px;
  background:var(--neon);
  color:#000;
  font-weight:bold;
  border-radius:6px;
  text-decoration:none;
}
.close{
  position:absolute;
  top:8px;
  right:12px;
  font-size:26px;
  color:var(--neon);
  cursor:pointer;
}
</style>
</head>

<body>

<!-- POPUP -->
<div id="popup" class="popup">
  <div class="popup-box">
    <span class="close" onclick="popup.style.display='none'">×</span>
    <img id="pImg">
    <h2 id="pTitle"></h2>
    <div id="links"></div>
  </div>
</div>

<script>
function openPopup(title,img,arr){
  popup.style.display="flex";
  pTitle.innerText=title;
  pImg.src=img;
  links.innerHTML="";
  arr.forEach(l=>{
    let a=document.createElement("a");
    a.className="link-btn";
    a.href=l.u;
    a.target="_blank";
    a.innerText=l.t;
    links.appendChild(a);
  });
}
function searchPost(v){
  v=v.toLowerCase();
  document.querySelectorAll(".post").forEach(p=>{
    p.style.display=p.innerText.toLowerCase().includes(v)?"":"none";
  });
}
</script>
